url: https://tkcaccia.github.io/fastEmbedR/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [github]

home:
  title: fastEmbedR
  description: Fast KNN and native openTSNE-style embeddings from precomputed nearest neighbours.

articles:
  - title: Start Here
    navbar: ~
    contents:
      - getting-started

reference:
  - title: KNN
    desc: Build nearest-neighbour matrices once and reuse them.
    contents:
      - nn
  - title: openTSNE Embeddings
    desc: Native openTSNE-style embedding, transform, and landmark workflows.
    contents:
      - opentsne
      - opentsne_knn
      - embed_knn
      - transform_tsne
      - landmark_tsne
  - title: Quality Metrics
    desc: Score local preservation, labels, and global structure.
    contents:
      - evaluate_embedding
  - title: Backends and Reproducibility
    desc: Inspect optional CPU/GPU nearest-neighbour backends explicitly.
    contents:
      - backend_info
      - metal_available
      - cuda_available
      - cuvs_available
      - faiss_available
      - set_seed
